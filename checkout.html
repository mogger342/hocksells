<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="./styles.css">

<style>
.checkout-img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  border-radius: 12px;
}

.step-content.hidden { display: none; }

.steps {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.step {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-bottom: 2px solid rgba(255,255,255,0.1);
  opacity: 0.5;
}

.step.active {
  border-color: #22c55e;
  opacity: 1;
}

.input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1e293b;
  color: white;
  margin: 10px 0;
}
</style>

<link rel="icon" type="image/png" href="./images/logo.png">

</head>

<body>

<header class="navbar">
  <h1 class="logo" onclick="location.href='index.html'">HockSells</h1>
</header>

<div class="product-page">
  <div id="checkout-container"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="./script.js"></script>

</body>
</html>
