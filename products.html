<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HockSells - Products</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./images/logo.png">
</head>
<body>

<div class="announcement-bar">
  <p id="announcement-text">🔥 Check our limited time offers</p>
</div>

<header class="navbar">
  <h1 class="logo">HockSells</h1>
  <nav>
    <a href="./index.html">Home</a>
    <a href="./products.html">Products</a>
  </nav>
</header>

<section class="filters">
  <button onclick="filterProducts('all', this)" class="active">All</button>
  <button onclick="filterProducts('cards', this)">Cards</button>
  <button onclick="filterProducts('logs', this)">Logs</button>
</section>

<section class="products" id="product-list"></section>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modal-title"></h2>
    <p id="modal-price"></p>
    <p id="modal-desc"></p>
    <button class="buy">Proceed to Payment</button>
  </div>
</div>

<footer class="footer">

  <div class="footer-top">
    <h2 class="footer-logo">HockSells</h2>

  </div>

  <div class="footer-bottom">
    <p>Copyright © HockSells 2026</p>

    <div class="footer-links">
      <a href="./terms.html">Terms of Service</a>
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./refund.html">Refund Policy</a>
    </div>
  </div>

</footer>

<script src="./script.js"></script>
</body>
</html>
